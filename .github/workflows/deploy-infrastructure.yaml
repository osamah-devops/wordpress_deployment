name: Deploy Infrastructure to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-infrastructure.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-infrastructure-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ROLE_TO_ASSUME: arn:aws:iam::072754096540:role/Osamah-Neamah
  STACK_PREFIX: wordpress

jobs:
  # ==========================================
  # VALIDATION JOB - Template syntax check
  # ==========================================
  validate:
    name: Validate CloudFormation Templates
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Validate Networking Template
      run: |
        aws cloudformation validate-template \
          --template-body file://infrastructure/networking.yaml

    - name: Validate Secrets Template
      run: |
        aws cloudformation validate-template \
          --template-body file://infrastructure/secrets.yaml

    - name: Validate Database Template
      run: |
        aws cloudformation validate-template \
          --template-body file://infrastructure/db.yaml

    - name: Validate ECS Template
      run: |
        aws cloudformation validate-template \
          --template-body file://infrastructure/ecs.yaml

  # ==========================================
  # DEPLOY SECRETS - Must be first
  # ==========================================
  deploy-secrets:
    name: Deploy Secrets Management
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      secrets-stack-id: ${{ steps.deploy.outputs.stack-id }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Deploy Secrets Stack
      id: deploy
      run: |
        aws cloudformation deploy \
          --template-file infrastructure/secrets.yaml \
          --stack-name "${{ env.STACK_PREFIX }}-secrets" \
          --region "${{ env.AWS_REGION }}" \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_NAMED_IAM CAPABILITY_IAM \
          --parameter-overrides \
            DBMasterUsername="marmil" \
            DBMasterPassword="Marmil#Mila"

        STACK_ID=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-secrets" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackId' \
          --output text)
        
        echo "stack-id=$STACK_ID" >> $GITHUB_OUTPUT

  # ==========================================
  # DEPLOY NETWORKING
  # ==========================================
  deploy-networking:
    name: Deploy VPC and Networking
    needs: deploy-secrets
    runs-on: ubuntu-latest
    outputs:
      networking-stack-id: ${{ steps.deploy.outputs.stack-id }}
      vpc-id: ${{ steps.exports.outputs.vpc-id }}
      private-subnet-1: ${{ steps.exports.outputs.private-subnet-1 }}
      private-subnet-2: ${{ steps.exports.outputs.private-subnet-2 }}
      ecs-security-group: ${{ steps.exports.outputs.ecs-security-group }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Recover Networking Stack If In Rollback Complete
      run: |
        STACK_NAME="${{ env.STACK_PREFIX }}-networking"
        STATUS=$(aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackStatus' \
          --output text 2>/dev/null || echo "STACK_NOT_FOUND")

        echo "Current networking stack status: $STATUS"

        if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "ROLLBACK_FAILED" ]; then
          echo "Deleting failed networking stack $STACK_NAME so deployment can continue..."
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          echo "Failed networking stack deleted successfully."
        fi

    - name: Deploy Networking Stack
      id: deploy
      run: |
        aws cloudformation deploy \
          --template-file infrastructure/networking.yaml \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            DomainName=marmil.co \
            HostedZoneId=Z06560653HHLUZYIU86O4 \
          --region "${{ env.AWS_REGION }}"

        STACK_ID=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackId' \
          --output text)
        echo "stack-id=$STACK_ID" >> $GITHUB_OUTPUT

    - name: Export Networking Values
      id: exports
      run: |
        VPC_ID=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].Outputs[?OutputKey==`VPCId`].OutputValue' \
          --output text)
        echo "vpc-id=$VPC_ID" >> $GITHUB_OUTPUT

        PRIVATE_SUBNET_1=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].Outputs[?OutputKey==`PrivateSubnet1Id`].OutputValue' \
          --output text)
        echo "private-subnet-1=$PRIVATE_SUBNET_1" >> $GITHUB_OUTPUT

        PRIVATE_SUBNET_2=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].Outputs[?OutputKey==`PrivateSubnet2Id`].OutputValue' \
          --output text)
        echo "private-subnet-2=$PRIVATE_SUBNET_2" >> $GITHUB_OUTPUT

        ECS_SG=$(aws cloudformation describe-stack-resource \
          --stack-name "${{ env.STACK_PREFIX }}-networking" \
          --logical-resource-id EcsContainerSecurityGroup \
          --region "${{ env.AWS_REGION }}" \
          --query 'StackResourceDetail.PhysicalResourceId' \
          --output text)
        echo "ecs-security-group=$ECS_SG" >> $GITHUB_OUTPUT

  # ==========================================
  # DEPLOY DATABASE
  # ==========================================
  deploy-database:
    name: Deploy RDS MySQL Database
    needs: deploy-networking
    runs-on: ubuntu-latest
    outputs:
      database-stack-id: ${{ steps.deploy.outputs.stack-id }}
      db-endpoint: ${{ steps.exports.outputs.db-endpoint }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Recover DB Stack If In Rollback Complete
      run: |
        STACK_NAME="${{ env.STACK_PREFIX }}-db"
        STATUS=$(aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackStatus' \
          --output text 2>/dev/null || echo "STACK_NOT_FOUND")

        echo "Current DB stack status: $STATUS"

        if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "ROLLBACK_FAILED" ]; then
          echo "Deleting failed DB stack $STACK_NAME so deployment can continue..."
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          echo "Failed DB stack deleted successfully."
        fi

    - name: Deploy Database Stack
      id: deploy
      run: |
        aws cloudformation deploy \
          --template-file infrastructure/db.yaml \
          --stack-name ${{ env.STACK_PREFIX }}-db \
          --region ${{ env.AWS_REGION }} \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_NAMED_IAM CAPABILITY_IAM \
          --parameter-overrides \
            DBMasterUsername=marmil \
            DBMasterPassword=Marmil#Mila \
            NetworkStackName=${{ env.STACK_PREFIX }}-networking
        
        STACK_ID=$(aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-db \
          --query 'Stacks[0].StackId' \
          --output text)
        echo "stack-id=$STACK_ID" >> $GITHUB_OUTPUT

    - name: Output Database Stack Exports
      id: exports
      run: |
        aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-db \
          --query 'Stacks[0].Outputs' \
          --output table
        
        DB_ENDPOINT=$(aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-db \
          --query 'Stacks[0].Outputs[?OutputKey==`DBEndpointAddress`].OutputValue' \
          --output text)
        echo "db-endpoint=$DB_ENDPOINT" >> $GITHUB_OUTPUT

  # ==========================================
  # DEPLOY ECS INFRASTRUCTURE
  # ==========================================
  deploy-ecs:
    name: Deploy ECS Cluster and Services
    needs: [deploy-networking, deploy-secrets, deploy-database]
    runs-on: ubuntu-latest
    outputs:
      ecs-stack-id: ${{ steps.deploy.outputs.stack-id }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Recover ECS Stack If In Rollback Complete
      run: |
        STACK_NAME="${{ env.STACK_PREFIX }}-ecs"
        STATUS=$(aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackStatus' \
          --output text 2>/dev/null || echo "STACK_NOT_FOUND")

        echo "Current ECS stack status: $STATUS"

        if [ "$STATUS" = "ROLLBACK_COMPLETE" ] || [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "ROLLBACK_FAILED" ]; then
          echo "Deleting failed ECS stack $STACK_NAME so deployment can continue..."
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          echo "Failed ECS stack deleted successfully."
        fi

    - name: Wait For ECS Stack To Be Deployable
      run: |
        STACK_NAME="${{ env.STACK_PREFIX }}-ecs"

        for i in {1..60}; do
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "STACK_NOT_FOUND")

          echo "ECS stack status: $STATUS"

          if [ "$STATUS" = "STACK_NOT_FOUND" ]; then
            break
          fi

          if [[ "$STATUS" == *_IN_PROGRESS ]]; then
            sleep 30
            continue
          fi

          break
        done

        FINAL_STATUS=$(aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].StackStatus' \
          --output text 2>/dev/null || echo "STACK_NOT_FOUND")

        if [[ "$FINAL_STATUS" == *_IN_PROGRESS ]]; then
          echo "ECS stack is still busy after waiting. Aborting to avoid CreateChangeSet conflicts."
          exit 1
        fi

        if [ "$FINAL_STATUS" = "ROLLBACK_COMPLETE" ] || \
           [ "$FINAL_STATUS" = "ROLLBACK_FAILED" ] || \
           [ "$FINAL_STATUS" = "CREATE_FAILED" ] || \
           [ "$FINAL_STATUS" = "DELETE_FAILED" ] || \
           [ "$FINAL_STATUS" = "UPDATE_ROLLBACK_COMPLETE" ] || \
           [ "$FINAL_STATUS" = "UPDATE_ROLLBACK_FAILED" ] || \
           [ "$FINAL_STATUS" = "IMPORT_ROLLBACK_COMPLETE" ]; then
          echo "ECS stack is in non-updatable state ($FINAL_STATUS). Deleting before deploy..."
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "${{ env.AWS_REGION }}"

          echo "ECS stack deleted and ready for fresh create."
        fi

    - name: Deploy ECS Stack
      id: deploy
      run: |
        TASK_EXEC_ROLE=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-secrets" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].Outputs[?OutputKey==`ECSTaskExecutionRoleArn`].OutputValue' \
          --output text)

        TASK_ROLE=$(aws cloudformation describe-stacks \
          --stack-name "${{ env.STACK_PREFIX }}-secrets" \
          --region "${{ env.AWS_REGION }}" \
          --query 'Stacks[0].Outputs[?OutputKey==`ECSTaskRoleArn`].OutputValue' \
          --output text)

        aws cloudformation deploy \
          --template-file infrastructure/ecs.yaml \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --region ${{ env.AWS_REGION }} \
          --no-fail-on-empty-changeset \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            VpcId=${{ needs.deploy-networking.outputs.vpc-id }} \
            SubnetIds='${{ needs.deploy-networking.outputs.private-subnet-1 }},${{ needs.deploy-networking.outputs.private-subnet-2 }}' \
            SecurityGroupId=${{ needs.deploy-networking.outputs.ecs-security-group }} \
            TaskExecutionRoleArn=$TASK_EXEC_ROLE \
            TaskRoleArn=$TASK_ROLE \
            DatabaseEndpoint=${{ needs.deploy-database.outputs.db-endpoint }} \
            WordPressHostname=marmil.co
        
        STACK_ID=$(aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --query 'Stacks[0].StackId' \
          --output text)
        echo "stack-id=$STACK_ID" >> $GITHUB_OUTPUT

    - name: Force New ECS Deployment
      run: |
        CLUSTER_NAME=$(aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --region ${{ env.AWS_REGION }} \
          --query 'Stacks[0].Outputs[?OutputKey==`ClusterName`].OutputValue' \
          --output text)

        SERVICE_NAME=$(aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --region ${{ env.AWS_REGION }} \
          --query 'Stacks[0].Outputs[?OutputKey==`ServiceName`].OutputValue' \
          --output text)

        echo "Forcing deployment for service $SERVICE_NAME in cluster $CLUSTER_NAME"
        aws ecs update-service \
          --cluster "$CLUSTER_NAME" \
          --service "$SERVICE_NAME" \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}

        aws ecs wait services-stable \
          --cluster "$CLUSTER_NAME" \
          --services "$SERVICE_NAME" \
          --region ${{ env.AWS_REGION }}

    - name: Output ECS Stack Exports
      run: |
        aws cloudformation describe-stacks \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --query 'Stacks[0].Outputs' \
          --output table

  # ==========================================
  # POST-DEPLOYMENT VALIDATION
  # ==========================================
  validate-deployment:
    name: Validate Infrastructure Deployment
    needs: deploy-ecs
    runs-on: ubuntu-latest
    
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
        audience: sts.amazonaws.com

    - name: Check ECS Cluster Status
      run: |
        CLUSTER_NAME=$(aws cloudformation describe-stack-resource \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --logical-resource-id ECSCluster \
          --query 'StackResourceDetail.PhysicalResourceId' \
          --output text)
        
        echo "Checking cluster: $CLUSTER_NAME"
        aws ecs describe-clusters --clusters $CLUSTER_NAME

    - name: Check ALB Status
      run: |
        ALB_ARN=$(aws cloudformation describe-stack-resource \
          --stack-name ${{ env.STACK_PREFIX }}-ecs \
          --logical-resource-id ApplicationLoadBalancer \
          --query 'StackResourceDetail.PhysicalResourceId' \
          --output text)
        
        echo "Checking ALB: $ALB_ARN"
        aws elbv2 describe-load-balancers --load-balancer-arns $ALB_ARN || true

    - name: Check VPC Status
      run: |
        VPC_ID=$(aws cloudformation describe-stack-resource \
          --stack-name ${{ env.STACK_PREFIX }}-networking \
          --logical-resource-id VPC \
          --query 'StackResourceDetail.PhysicalResourceId' \
          --output text)
        
        echo "Checking VPC: $VPC_ID"
        aws ec2 describe-vpcs --vpc-ids $VPC_ID

    - name: Deployment Summary
      run: |
        echo "=== Infrastructure Deployment Summary ==="
        aws cloudformation describe-stacks \
          --query 'Stacks[?starts_with(StackName, `${{ env.STACK_PREFIX }}`)].[StackName,StackStatus,CreationTime]' \
          --output table
