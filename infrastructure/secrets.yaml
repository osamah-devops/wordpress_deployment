AWSTemplateFormatVersion: "2010-09-09"
Description: "Secrets Management for WordPress deployment - Database credentials and API keys"

Parameters:
  DBMasterUsername:
    Type: String
    Default: marmil
    Description: Admin username for the database
    NoEcho: true
  
  DBMasterPassword:
    Type: String
    Description: Master password for the database
    NoEcho: true
    MinLength: 8

Resources:
  # ==========================================
  # SECRETS FOR DATABASE
  # ==========================================
  WordPressDatabasePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wordpress-db-password
      Description: WordPress database master password
      SecretString: !Sub |
        {
          "username": "${DBMasterUsername}",
          "password": "${DBMasterPassword}"
        }
      Tags:
        - Key: Name
          Value: wordpress-db-password
        - Key: Environment
          Value: production

  WordPressDatabaseUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: wordpress-db-user
      Description: WordPress database username
      SecretString: !Sub |
        {
          "username": "${DBMasterUsername}"
        }
      Tags:
        - Key: Name
          Value: wordpress-db-user
        - Key: Environment
          Value: production

  # ==========================================
  # IAM ROLE FOR ECS TASK TO ACCESS SECRETS
  # ==========================================
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !GetAtt WordPressDatabasePasswordSecret.SecretArn
                  - !GetAtt WordPressDatabaseUserSecret.SecretArn
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/wordpress:*"
      Tags:
        - Key: Name
          Value: ecs-task-execution-role
        - Key: Environment
          Value: production

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::wordpress-uploads-${AWS::AccountId}/*"
      Tags:
        - Key: Name
          Value: ecs-task-role
        - Key: Environment
          Value: production

  # ==========================================
  # LOG GROUP FOR ECS
  # ==========================================
  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/wordpress
      RetentionInDays: 30

Outputs:
  DatabasePasswordSecretArn:
    Description: ARN of the WordPress database password secret
    Value: !GetAtt WordPressDatabasePasswordSecret.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-db-password-arn"

  DatabaseUserSecretArn:
    Description: ARN of the WordPress database user secret
    Value: !GetAtt WordPressDatabaseUserSecret.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}-db-user-arn"

  ECSTaskExecutionRoleArn:
    Description: ARN of the ECS task execution role
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-task-execution-role-arn"

  ECSTaskRoleArn:
    Description: ARN of the ECS task role
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-task-role-arn"

  LogGroupName:
    Description: ECS Log Group name
    Value: !Ref ECSLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-log-group"
