AWSTemplateFormatVersion: "2010-09-09"
Description: "ECS Cluster and Service for WordPress deployment"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where ECS resources will be deployed
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for the ECS service
  
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ECS tasks
  
  TaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS task execution role
  
  TaskRoleArn:
    Type: String
    Description: ARN of the ECS task role
  
  ContainerImage:
    Type: String
    Default: bitnami/wordpress:latest
    Description: Docker image for the WordPress container
  
  ContainerPort:
    Type: Number
    Default: 8080
    Description: Container port for WordPress

  DatabaseEndpoint:
    Type: String
    Description: RDS database endpoint address
    Default: wordpress-db.123456789.us-east-1.rds.amazonaws.com

  WordPressHostname:
    Type: String
    Description: Public hostname for WordPress
    Default: marmil.co

Resources:
  # ==========================================
  # ECS CLUSTER
  # ==========================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: wordpress-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Name
          Value: wordpress-cluster
        - Key: Environment
          Value: production

  # ==========================================
  # APPLICATION LOAD BALANCER
  # ==========================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internet-facing
      Subnets: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: wordpress-alb
        - Key: Environment
          Value: production

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPort: !Sub "${ContainerPort}"
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-399"
      Tags:
        - Key: Name
          Value: wordpress-targets
        - Key: Environment
          Value: production

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !GetAtt TargetGroup.TargetGroupArn
      LoadBalancerArn: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
      Port: 80
      Protocol: HTTP

  # ==========================================
  # ECS TASK DEFINITION
  # ==========================================
  WordPressTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: wordpress
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      ContainerDefinitions:
        - Name: wordpress
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              HostPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/wordpress
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: WORDPRESS_DATABASE_HOST
              Value: !Ref DatabaseEndpoint
            - Name: WORDPRESS_DATABASE_NAME
              Value: wordpress
            - Name: WORDPRESS_USERNAME
              Value: admin
            - Name: WORDPRESS_HOSTNAME
              Value: !Ref WordPressHostname
          Secrets:
            - Name: WORDPRESS_DATABASE_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:wordpress-db-user:username::"
            - Name: WORDPRESS_DATABASE_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:wordpress-db-password:password::"
            - Name: WORDPRESS_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:wordpress-admin-password:password::"

  # ==========================================
  # ECS SERVICE
  # ==========================================
  WordPressService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: wordpress-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref WordPressTaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref SecurityGroupId
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: wordpress
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !GetAtt TargetGroup.TargetGroupArn
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Name
          Value: wordpress-service
        - Key: Environment
          Value: production

  # ==========================================
  # AUTO SCALING
  # ==========================================
  ServiceScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 2
      ResourceId: !Sub "service/${ECSCluster}/${WordPressService.Name}"
      RoleARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService"
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: wordpress-scaling-policy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

Outputs:
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-cluster-name"

  ServiceName:
    Description: ECS Service name
    Value: !GetAtt WordPressService.Name
    Export:
      Name: !Sub "${AWS::StackName}-service-name"

  LoadBalancerUrl:
    Description: URL of the Application Load Balancer
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
    Export:
      Name: !Sub "${AWS::StackName}-alb-url"

  TargetGroupArn:
    Description: Target Group ARN
    Value: !GetAtt TargetGroup.TargetGroupArn
    Export:
      Name: !Sub "${AWS::StackName}-target-group-arn"

  TaskDefinitionArn:
    Description: Task Definition ARN
    Value: !Ref WordPressTaskDefinition
    Export:
      Name: !Sub "${AWS::StackName}-task-definition-arn"
