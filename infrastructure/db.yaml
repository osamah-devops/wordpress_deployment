AWSTemplateFormatVersion: "2010-09-09"
Description: "RDS MySQL Database for WordPress deployment with high availability and automated backups"

# ==========================================
# PARAMETERS SECTION
# ==========================================
Parameters:
  NetworkStackName:
    Type: String
    Default: wordpress-networking
    Description: "The name of your deployed base networking CloudFormation stack."

  DBMasterUsername:
    Type: String
    Default: marmil
    Description: Master username for the database
    NoEcho: true
  
  DBMasterPassword:
    Type: String
    Description: Master password for the database
    NoEcho: true
    MinLength: 8
  
  DBName:
    Type: String
    Default: wordpress
    Description: Name of the WordPress database
  
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Database instance class
    AllowedValues:
      - db.t3.micro 
      - db.t3.small  
      - db.t3.medium 
      - db.t4g.micro  
      - db.t4g.small  
  
  AllocatedStorage:
    Type: Number
    Default: 20
    Description: Allocated storage in GB
    MinValue: 20
    MaxValue: 65536

  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
    MinValue: 1
    MaxValue: 35
  
  PreferredBackupWindow:
    Type: String
    Default: "03:00-04:00"
    Description: Preferred backup window (UTC)
  
  PreferredMaintenanceWindow:
    Type: String
    Default: "sun:04:00-sun:05:00"
    Description: Preferred maintenance window (UTC)

Resources:
  # ==========================================
  # RDS DATABASE SECURITY GROUP
  # ==========================================
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: wordpress-db-sg
      GroupDescription: "Security group for WordPress RDS database - allows access from ECS containers"
      VpcId: !ImportValue 
        Fn::Sub: "${NetworkStackName}-vpc-id"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !ImportValue 
            Fn::Sub: "${NetworkStackName}-allowed-sg-id"
          Description: "MySQL from ECS containers"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: "Allow all outbound traffic"
      Tags:
        - Key: Name
          Value: wordpress-db-sg
        - Key: Environment
          Value: production

  # ==========================================
  # DB SUBNET GROUP (Multi-AZ)
  # ==========================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: wordpress-db-subnet-group
      DBSubnetGroupDescription: "Subnet group for WordPress RDS in multiple AZs"
      SubnetIds:
        - !ImportValue 
          Fn::Sub: "${NetworkStackName}-private-subnet-1-id"
        - !ImportValue 
          Fn::Sub: "${NetworkStackName}-private-subnet-2-id"
      Tags:
        - Key: Name
          Value: wordpress-db-subnet-group
        - Key: Environment
          Value: production

  # ==========================================
  # RDS MYSQL INSTANCE (8.4)
  # ==========================================
  WordPressDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      # Basic Configuration
      DBInstanceIdentifier: wordpress-db
      Engine: mysql
      EngineVersion: "8.4"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      
      # Linked Tuning Configurations
      DBParameterGroupName: !Ref WordPressDBParameterGroup
      OptionGroupName: !Ref WordPressDBOptionGroup
      
      # Database Credentials
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBName: !Ref DBName
      
      # Networking
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      PubliclyAccessible: false
      
      # High Availability
      MultiAZ: true
      
      # Backup & Maintenance
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      CopyTagsToSnapshot: true
      
      # Performance & Monitoring
      EnableCloudwatchLogsExports:
        - error
        - general
        - slowquery
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      EnablePerformanceInsights: false
      
      # Automation
      AutoMinorVersionUpgrade: true
      DeletionProtection: true
      EnableIAMDatabaseAuthentication: false
      DeleteAutomatedBackups: false
      Tags:
        - Key: Name
          Value: wordpress-database
        - Key: Environment
          Value: production

  # ==========================================
  # RDS MONITORING ROLE
  # ==========================================
  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      Tags:
        - Key: Name
          Value: rds-monitoring-role
        - Key: Environment
          Value: production

  # ==========================================
  # DB PARAMETER GROUP (MySQL 8.4 Optimizations)
  # ==========================================
  WordPressDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      DBParameterGroupName: wordpress-mysql84-params
      Description: "Optimized MySQL 8.4 parameters for WordPress"
      Family: mysql8.4
      Parameters:
        max_connections: 100
        slow_query_log: 1
        long_query_time: 2
        log_bin_trust_function_creators: 1
        character_set_server: utf8mb4
        collation_server: utf8mb4_unicode_ci
        interactive_timeout: 300
        wait_timeout: 300
      Tags:
        - Key: Name
          Value: wordpress-db-params
        - Key: Environment
          Value: production

  # ==========================================
  # DB OPTION GROUP
  # ==========================================
  WordPressDBOptionGroup:
    Type: AWS::RDS::OptionGroup
    Properties:
      OptionGroupName: wordpress-mysql84-options
      OptionGroupDescription: "Option group for WordPress MySQL 8.4"
      EngineName: mysql
      MajorEngineVersion: "8.4"
      Tags:
        - Key: Name
          Value: wordpress-db-options
        - Key: Environment
          Value: production

  # ==========================================
  # CLOUDWATCH ALARMS
  # ==========================================
  DBHighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wordpress-db-high-cpu
      AlarmDescription: "Alert when RDS CPU usage is high"
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref WordPressDatabase
      TreatMissingData: notBreaching

  DBLowStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wordpress-db-low-storage
      AlarmDescription: "Alert when RDS free storage falls below 5GB"
      MetricName: FreeStorageSpace
      Namespace: AWS/RDS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5368709120   # 5GB represented cleanly in bytes
      ComparisonOperator: LessThanOrEqualToThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref WordPressDatabase
      TreatMissingData: breaching

Outputs:
  DBEndpointAddress:
    Description: "Connection endpoint for the WordPress database instance"
    Value: !GetAtt WordPressDatabase.Endpoint.Address
